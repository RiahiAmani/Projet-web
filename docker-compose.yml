version: "3.9"

services:
  db:
    image: postgres:15
    environment:
      POSTGRES_USER: myuser
      POSTGRES_PASSWORD: mypassword
      POSTGRES_DB: mydb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    command: python manage.py runserver 0.0.0.0:8000
    volumes:
      - ./backend:/app
    ports:
      - "8000:8000"
    depends_on:
      - db
    environment:
      - DATABASE_HOST=db
      - DATABASE_NAME=mydb
      - DATABASE_USER=myuser
      - DATABASE_PASSWORD=mypassword

  frontend:                     
    build: ./frontend/my-app      
    volumes:                      
      - ./frontend/my-app:/app    
      - /app/node_modules         
    ports:                         
      - "3000:3000"                
    stdin_open: true              
    tty: true                      
    depends_on:                   
      - backend                    

volumes:
  postgres_data: